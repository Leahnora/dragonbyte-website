<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Borrowings - Asset Registry</title>
  
  <!-- Alpine.js CDN -->
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  
  <!-- Custom Styles -->
  <link rel="stylesheet" href="css/styles.css">
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.bunny.net">
  <link href="https://fonts.bunny.net/css?family=figtree:400,500,600&display=swap" rel="stylesheet">
</head>
<body class="font-sans antialiased bg-gray-100">
  <div class="min-h-screen">
    <!-- Navigation -->
    <div id="navigation"></div>

    <!-- Page Header -->
    <header class="bg-white shadow">
      <div class="max-w-7xl mx-auto py-6 px-4 sm:px-6 lg:px-8">
        <h2 class="font-semibold text-xl text-gray-800 leading-tight">Borrowings</h2>
      </div>
    </header>

    <!-- Main Content -->
    <main class="py-12" x-data="borrowingsData()">
      <div class="max-w-7xl mx-auto sm:px-6 lg:px-8">
        <!-- Summary Cards -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
          <div class="bg-white overflow-hidden shadow-sm sm:rounded-lg card-hover">
            <div class="p-6">
              <div class="text-gray-500 text-sm">Active Borrowings</div>
              <div class="text-3xl font-bold text-blue-900" x-text="activeBorrowings.length"></div>
            </div>
          </div>
          
          <div class="bg-white overflow-hidden shadow-sm sm:rounded-lg card-hover">
            <div class="p-6">
              <div class="text-gray-500 text-sm">Overdue Returns</div>
              <div class="text-3xl font-bold text-red-900" x-text="overdueBorrowings.length"></div>
            </div>
          </div>
          
          <div class="bg-white overflow-hidden shadow-sm sm:rounded-lg card-hover">
            <div class="p-6">
              <div class="text-gray-500 text-sm">Returned</div>
              <div class="text-3xl font-bold text-green-900" x-text="returnedBorrowings.length"></div>
            </div>
          </div>
        </div>

        <!-- Status Filter -->
        <div class="mb-6 flex gap-2">
          <button @click="statusFilter = 'all'" :class="statusFilter === 'all' ? 'bg-blue-600 text-white' : 'bg-white text-gray-700'" class="px-4 py-2 rounded-lg shadow-sm font-medium">
            All (<span x-text="borrowings.length"></span>)
          </button>
          <button @click="statusFilter = 'active'" :class="statusFilter === 'active' ? 'bg-blue-600 text-white' : 'bg-white text-gray-700'" class="px-4 py-2 rounded-lg shadow-sm font-medium">
            Active (<span x-text="activeBorrowings.length"></span>)
          </button>
          <button @click="statusFilter = 'overdue'" :class="statusFilter === 'overdue' ? 'bg-red-600 text-white' : 'bg-white text-gray-700'" class="px-4 py-2 rounded-lg shadow-sm font-medium">
            Overdue (<span x-text="overdueBorrowings.length"></span>)
          </button>
          <button @click="statusFilter = 'returned'" :class="statusFilter === 'returned' ? 'bg-green-600 text-white' : 'bg-white text-gray-700'" class="px-4 py-2 rounded-lg shadow-sm font-medium">
            Returned (<span x-text="returnedBorrowings.length"></span>)
          </button>
        </div>

        <!-- Overdue Alert -->
        <div x-show="overdueBorrowings.length > 0 && (statusFilter === 'all' || statusFilter === 'overdue')" class="bg-red-50 border border-red-500 border-opacity-40 p-4 mb-6 rounded">
          <div class="flex">
            <div class="flex-shrink-0">
              <svg class="h-5 w-5 text-red-400" fill="currentColor" viewBox="0 0 20 20">
                <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"/>
              </svg>
            </div>
            <div class="ml-3">
              <h3 class="text-sm font-medium text-red-800">
                <span x-text="overdueBorrowings.length"></span> overdue return(s) require attention
              </h3>
              <p class="mt-1 text-sm text-red-700">
                Please contact the borrowers to arrange for immediate return of the assets.
              </p>
            </div>
          </div>
        </div>

        <!-- Borrowings List -->
        <div class="space-y-4">
          <template x-for="borrowing in filteredBorrowings" :key="borrowing.id">
            <div class="bg-white overflow-hidden shadow-sm sm:rounded-lg border" :class="getBorrowingBorderClass(borrowing)">
              <div class="p-6">
                <div class="flex flex-col md:flex-row md:items-center md:justify-between">
                  <!-- Asset Info -->
                  <div class="flex-1 mb-4 md:mb-0">
                    <div class="flex items-start">
                      <div class="flex-shrink-0">
                        <svg class="h-10 w-10 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                        </svg>
                      </div>
                      <div class="ml-4">
                        <h3 class="text-lg font-semibold text-gray-900" x-text="borrowing.asset_name"></h3>
                        <p class="text-sm text-gray-600" x-text="borrowing.asset_number"></p>
                        <div class="mt-2 flex items-center text-sm text-gray-500">
                          <svg class="h-4 w-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                          </svg>
                          <span x-text="borrowing.borrowed_by"></span>
                        </div>
                      </div>
                    </div>
                  </div>

                  <!-- Dates Info -->
                  <div class="flex-1 grid grid-cols-2 gap-4 mb-4 md:mb-0">
                    <div>
                      <div class="text-xs text-gray-500 uppercase font-medium">Borrowed Date</div>
                      <div class="text-sm font-medium text-gray-900" x-text="formatDate(borrowing.borrowed_date)"></div>
                    </div>
                    <div>
                      <div class="text-xs text-gray-500 uppercase font-medium">Expected Return</div>
                      <div class="text-sm font-medium" :class="borrowing.isOverdue && borrowing.status === 'active' ? 'text-red-600' : 'text-gray-900'" x-text="formatDate(borrowing.expected_return_date)"></div>
                      <div x-show="borrowing.isOverdue && borrowing.status === 'active'" class="text-xs text-red-600 font-semibold">
                        OVERDUE
                      </div>
                    </div>
                    <div x-show="borrowing.actual_return_date" class="col-span-2">
                      <div class="text-xs text-gray-500 uppercase font-medium">Actual Return</div>
                      <div class="text-sm font-medium text-green-600" x-text="formatDate(borrowing.actual_return_date)"></div>
                    </div>
                  </div>

                  <!-- Status Badge -->
                  <div class="flex-shrink-0">
                    <span class="px-3 py-1 text-sm font-semibold rounded-full" :class="getStatusClass(borrowing)" x-text="getStatusLabel(borrowing)"></span>
                  </div>
                </div>

                <!-- Purpose -->
                <div class="mt-4 pt-4 border-t border-gray-200">
                  <div class="text-xs text-gray-500 uppercase font-medium mb-1">Purpose</div>
                  <p class="text-sm text-gray-700" x-text="borrowing.purpose"></p>
                </div>

                <!-- Action Buttons -->
                <div class="mt-4 flex gap-2" x-show="borrowing.status === 'active'">
                  <button class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded text-sm font-medium transition" disabled>
                    Mark as Returned
                  </button>
                  <a :href="'asset-detail.html?id=' + borrowing.asset_id" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded text-sm font-medium transition">
                    View Asset
                  </a>
                </div>
              </div>
            </div>
          </template>
        </div>

        <!-- No Results -->
        <div x-show="filteredBorrowings.length === 0" class="bg-white overflow-hidden shadow-sm sm:rounded-lg">
          <div class="p-12 text-center">
            <svg class="mx-auto h-12 w-12 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
            </svg>
            <h3 class="mt-2 text-sm font-medium text-gray-900">No borrowings found</h3>
            <p class="mt-1 text-sm text-gray-500">No borrowings match the selected filter.</p>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Scripts -->
  <script src="js/app.js"></script>
  <script src="js/navigation.js"></script>
  <script>
    function borrowingsData() {
      const demoData = JSON.parse(localStorage.getItem('demoData'));
      
      return {
        borrowings: demoData.borrowings,
        statusFilter: 'all',
        
        get activeBorrowings() {
          return this.borrowings.filter(b => b.status === 'active' && !b.isOverdue);
        },
        
        get overdueBorrowings() {
          return this.borrowings.filter(b => b.status === 'active' && b.isOverdue);
        },
        
        get returnedBorrowings() {
          return this.borrowings.filter(b => b.status === 'returned');
        },
        
        get filteredBorrowings() {
          if (this.statusFilter === 'active') {
            return this.activeBorrowings;
          } else if (this.statusFilter === 'overdue') {
            return this.overdueBorrowings;
          } else if (this.statusFilter === 'returned') {
            return this.returnedBorrowings;
          }
          return this.borrowings;
        },
        
        getBorrowingBorderClass(borrowing) {
          if (borrowing.status === 'active' && borrowing.isOverdue) {
            return 'border-red-500 border-opacity-40';
          } else if (borrowing.status === 'active') {
            return 'border-yellow-500 border-opacity-40';
          } else {
            return 'border-green-500 border-opacity-40';
          }
        },
        
        getStatusClass(borrowing) {
          if (borrowing.status === 'active' && borrowing.isOverdue) {
            return 'bg-red-100 text-red-800';
          } else if (borrowing.status === 'active') {
            return 'bg-yellow-100 text-yellow-800';
          } else {
            return 'bg-green-100 text-green-800';
          }
        },
        
        getStatusLabel(borrowing) {
          if (borrowing.status === 'active' && borrowing.isOverdue) {
            return 'Overdue';
          } else if (borrowing.status === 'active') {
            return 'Active';
          } else {
            return 'Returned';
          }
        },
        
        formatDate(dateString) {
          if (!dateString) return 'N/A';
          return new Date(dateString).toLocaleDateString('en-US', {
            year: 'numeric',
            month: 'short',
            day: 'numeric'
          });
        }
      };
    }
  </script>
</body>
</html>
