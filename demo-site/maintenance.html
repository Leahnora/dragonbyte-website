<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maintenance Logs - Asset Registry</title>
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Alpine.js CDN -->
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  
  <!-- Custom Styles -->
  <link rel="stylesheet" href="css/styles.css">
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.bunny.net">
  <link href="https://fonts.bunny.net/css?family=figtree:400,500,600&display=swap" rel="stylesheet">
</head>
<body class="font-sans antialiased bg-gray-100">
  <div class="min-h-screen">
    <!-- Navigation -->
    <div id="navigation"></div>

    <!-- Page Header -->
    <header class="bg-white shadow">
      <div class="max-w-7xl mx-auto py-6 px-4 sm:px-6 lg:px-8 flex justify-between items-center">
        <h2 class="font-semibold text-xl text-gray-800 leading-tight">Maintenance Logs</h2>
      </div>
    </header>

    <!-- Main Content -->
    <main class="py-12" x-data="maintenanceData()">
      <div class="max-w-7xl mx-auto sm:px-6 lg:px-8">
        <!-- Summary Cards -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
          <div class="bg-white overflow-hidden shadow-sm sm:rounded-lg card-hover">
            <div class="p-6">
              <div class="text-gray-500 text-sm">Total Maintenance</div>
              <div class="text-3xl font-bold text-blue-900" x-text="logs.length"></div>
            </div>
          </div>
          
          <div class="bg-white overflow-hidden shadow-sm sm:rounded-lg card-hover">
            <div class="p-6">
              <div class="text-gray-500 text-sm">Total Cost</div>
              <div class="text-3xl font-bold text-green-900" x-text="formatCurrency(totalCost)"></div>
            </div>
          </div>
          
          <div class="bg-white overflow-hidden shadow-sm sm:rounded-lg card-hover">
            <div class="p-6">
              <div class="text-gray-500 text-sm">Average Cost</div>
              <div class="text-3xl font-bold text-purple-900" x-text="formatCurrency(averageCost)"></div>
            </div>
          </div>
        </div>

        <!-- Maintenance Logs Table -->
        <div class="bg-white overflow-hidden shadow-sm sm:rounded-lg">
          <div class="p-6">
            <h3 class="text-lg font-semibold text-gray-900 mb-4">Maintenance History</h3>
            
            <!-- Search and Filter -->
            <div class="mb-4">
              <input type="text" x-model="search" placeholder="Search by asset or description..." class="w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500">
            </div>

            <!-- Table -->
            <div class="overflow-x-auto">
              <table class="min-w-full divide-y divide-gray-200">
                <thead class="bg-gray-50">
                  <tr>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Date</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Asset</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Description</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Service Provider</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Cost</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Next Maintenance</th>
                  </tr>
                </thead>
                <tbody class="bg-white divide-y divide-gray-200">
                  <template x-for="log in filteredLogs" :key="log.id">
                    <tr class="hover:bg-gray-50">
                      <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900" x-text="formatDate(log.date)"></td>
                      <td class="px-6 py-4 whitespace-nowrap">
                        <div class="text-sm font-medium text-gray-900" x-text="log.asset_number"></div>
                        <div class="text-sm text-gray-500" x-text="log.asset_name"></div>
                      </td>
                      <td class="px-6 py-4 text-sm text-gray-900" x-text="log.description"></td>
                      <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500" x-text="log.service_provider"></td>
                      <td class="px-6 py-4 whitespace-nowrap text-sm font-medium" :class="log.cost > 0 ? 'text-gray-900' : 'text-green-600'" x-text="log.cost > 0 ? formatCurrency(log.cost) : 'Warranty'"></td>
                      <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500" x-text="log.next_maintenance ? formatDate(log.next_maintenance) : 'N/A'"></td>
                    </tr>
                  </template>
                </tbody>
              </table>
            </div>

            <!-- No Results -->
            <div x-show="filteredLogs.length === 0" class="text-center py-8">
              <p class="text-gray-500">No maintenance logs found.</p>
            </div>
          </div>
        </div>

        <!-- Maintenance by Asset -->
        <div class="mt-6 bg-white overflow-hidden shadow-sm sm:rounded-lg">
          <div class="p-6">
            <h3 class="text-lg font-semibold text-gray-900 mb-4">Maintenance by Asset</h3>
            <div class="space-y-3">
              <template x-for="[assetId, assetLogs] in maintenanceByAsset" :key="assetId">
                <div class="border border-blue-500 border-opacity-30 p-4 bg-gray-50 rounded">
                  <div class="flex justify-between items-center">
                    <div>
                      <div class="font-medium text-gray-900" x-text="assetLogs[0].asset_number + ' - ' + assetLogs[0].asset_name"></div>
                      <div class="text-sm text-gray-600" x-text="assetLogs.length + ' maintenance record(s)'"></div>
                    </div>
                    <div class="text-right">
                      <div class="text-sm text-gray-500">Total Cost</div>
                      <div class="font-semibold text-gray-900" x-text="formatCurrency(assetLogs.reduce((sum, log) => sum + log.cost, 0))"></div>
                    </div>
                  </div>
                </div>
              </template>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Scripts -->
  <script src="js/app.js"></script>
  <script src="js/navigation.js"></script>
  <script>
    function maintenanceData() {
      const demoData = JSON.parse(localStorage.getItem('demoData'));
      
      return {
        logs: demoData.maintenanceLogs,
        search: '',
        
        get filteredLogs() {
          return this.logs.filter(log => {
            const searchLower = this.search.toLowerCase();
            return !this.search || 
              log.asset_name.toLowerCase().includes(searchLower) ||
              log.asset_number.toLowerCase().includes(searchLower) ||
              log.description.toLowerCase().includes(searchLower) ||
              log.service_provider.toLowerCase().includes(searchLower);
          });
        },
        
        get totalCost() {
          return this.logs.reduce((sum, log) => sum + log.cost, 0);
        },
        
        get averageCost() {
          return this.logs.length > 0 ? this.totalCost / this.logs.length : 0;
        },
        
        get maintenanceByAsset() {
          const grouped = {};
          this.logs.forEach(log => {
            if (!grouped[log.asset_id]) {
              grouped[log.asset_id] = [];
            }
            grouped[log.asset_id].push(log);
          });
          return Object.entries(grouped);
        },
        
        formatCurrency(amount) {
          return new Intl.NumberFormat('en-US', {
            style: 'currency',
            currency: 'USD'
          }).format(amount);
        },
        
        formatDate(dateString) {
          return new Date(dateString).toLocaleDateString('en-US', {
            year: 'numeric',
            month: 'short',
            day: 'numeric'
          });
        }
      };
    }
  </script>
</body>
</html>
