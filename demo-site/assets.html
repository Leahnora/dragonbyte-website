<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Assets - Asset Registry</title>
  
  <!-- Alpine.js CDN -->
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  
  <!-- Custom Styles -->
  <link rel="stylesheet" href="css/styles.css">
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.bunny.net">
  <link href="https://fonts.bunny.net/css?family=figtree:400,500,600&display=swap" rel="stylesheet">
</head>
<body class="font-sans antialiased bg-gray-100">
  <div class="min-h-screen">
    <!-- Navigation -->
    <div id="navigation"></div>

    <!-- Page Header -->
    <header class="bg-white shadow">
      <div class="max-w-7xl mx-auto py-6 px-4 sm:px-6 lg:px-8 flex justify-between items-center">
        <h2 class="font-semibold text-xl text-gray-800 leading-tight">Assets</h2>
        <div class="bg-blue-50 border border-blue-200 px-3 py-1 rounded text-sm text-blue-700">
          <strong>Demo Mode:</strong> Filters work client-side
        </div>
      </div>
    </header>

    <!-- Main Content -->
    <main class="py-12" x-data="assetsData()">
      <div class="max-w-7xl mx-auto sm:px-6 lg:px-8">
        <!-- Search and Filters -->
        <div class="bg-white overflow-hidden shadow-sm sm:rounded-lg mb-6">
          <div class="p-6">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-4">
              <div class="search-input-wrapper">
                <input type="text" x-model="search" placeholder="Search assets..." class="w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500">
              </div>
              <div>
                <select x-model="filterCategory" class="w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500">
                  <option value="">All Categories</option>
                  <template x-for="category in categories" :key="category">
                    <option :value="category" x-text="category"></option>
                  </template>
                </select>
              </div>
              <div>
                <select x-model="filterDivision" class="w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500">
                  <option value="">All Divisions</option>
                  <template x-for="division in divisions" :key="division">
                    <option :value="division" x-text="division"></option>
                  </template>
                </select>
              </div>
              <div>
                <select x-model="filterStatus" class="w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500">
                  <option value="">All Statuses</option>
                  <option value="available">Available</option>
                  <option value="in_use">In Use</option>
                  <option value="maintenance">Maintenance</option>
                  <option value="damaged">Damaged</option>
                  <option value="retired">Retired</option>
                </select>
              </div>
            </div>
            <div class="flex gap-2">
              <button @click="clearFilters()" class="bg-gray-300 hover:bg-gray-400 text-gray-800 font-bold py-2 px-4 rounded">
                Clear Filters
              </button>
              <div class="ml-auto text-sm text-gray-600 flex items-center">
                Showing <span class="font-semibold mx-1" x-text="filteredAssets.length"></span> of <span class="font-semibold mx-1" x-text="allAssets.length"></span> assets
              </div>
            </div>
          </div>
        </div>

        <!-- Assets Grid -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" x-show="filteredAssets.length > 0">
          <template x-for="asset in filteredAssets" :key="asset.id">
            <div class="bg-white overflow-hidden shadow-sm sm:rounded-lg card-hover">
              <div class="p-6">
                <!-- Asset Header -->
                <div class="flex justify-between items-start mb-4">
                  <div>
                    <h3 class="text-lg font-semibold text-gray-900" x-text="asset.name"></h3>
                    <p class="text-sm text-gray-500" x-text="asset.asset_number"></p>
                  </div>
                  <span class="px-2 py-1 text-xs font-semibold rounded-full" :class="getStatusClass(asset.status)" x-text="getStatusLabel(asset.status)"></span>
                </div>

                <!-- Asset Details -->
                <div class="space-y-2 mb-4">
                  <div class="flex items-center text-sm">
                    <svg class="h-4 w-4 text-gray-400 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z"></path>
                    </svg>
                    <span class="text-gray-600" x-text="asset.category"></span>
                  </div>
                  <div class="flex items-center text-sm">
                    <svg class="h-4 w-4 text-gray-400 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"></path>
                    </svg>
                    <span class="text-gray-600" x-text="asset.division"></span>
                  </div>
                  <div class="flex items-center text-sm">
                    <svg class="h-4 w-4 text-gray-400 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                    </svg>
                    <span class="text-gray-600" x-text="asset.assigned_to || 'Unassigned'"></span>
                  </div>
                </div>

                <!-- Asset Value -->
                <div class="border-t border-gray-200 pt-4 mb-4">
                  <div class="flex justify-between items-center">
                    <span class="text-sm text-gray-500">Current Value</span>
                    <span class="text-lg font-bold text-gray-900" x-text="formatCurrency(asset.current_value)"></span>
                  </div>
                  <div class="flex justify-between items-center mt-1">
                    <span class="text-xs text-gray-400">Purchase Cost</span>
                    <span class="text-sm text-gray-600" x-text="formatCurrency(asset.purchase_cost)"></span>
                  </div>
                </div>

                <!-- Actions -->
                <div class="flex gap-2">
                  <a :href="'asset-detail.html?id=' + asset.id" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white text-center py-2 px-4 rounded text-sm font-medium transition">
                    View Details
                  </a>
                </div>
              </div>
            </div>
          </template>
        </div>

        <!-- No Results Message -->
        <div x-show="filteredAssets.length === 0" class="bg-white overflow-hidden shadow-sm sm:rounded-lg">
          <div class="p-12 text-center">
            <svg class="mx-auto h-12 w-12 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
            </svg>
            <h3 class="mt-2 text-sm font-medium text-gray-900">No assets found</h3>
            <p class="mt-1 text-sm text-gray-500">Try adjusting your search or filter criteria.</p>
            <div class="mt-6">
              <button @click="clearFilters()" class="inline-flex items-center px-4 py-2 border border-transparent shadow-sm text-sm font-medium rounded-md text-white bg-blue-600 hover:bg-blue-700">
                Clear all filters
              </button>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Scripts -->
  <script src="js/app.js"></script>
  <script src="js/navigation.js"></script>
  <script>
    function assetsData() {
      const demoData = JSON.parse(localStorage.getItem('demoData'));
      const urlParams = new URLSearchParams(window.location.search);
      
      return {
        allAssets: demoData.assets,
        categories: demoData.categories,
        divisions: demoData.divisions,
        search: '',
        filterCategory: '',
        filterDivision: '',
        filterStatus: urlParams.get('status') || '',
        
        get filteredAssets() {
          return this.allAssets.filter(asset => {
            const matchesSearch = !this.search || 
              asset.name.toLowerCase().includes(this.search.toLowerCase()) ||
              asset.asset_number.toLowerCase().includes(this.search.toLowerCase()) ||
              asset.description.toLowerCase().includes(this.search.toLowerCase());
            
            const matchesCategory = !this.filterCategory || asset.category === this.filterCategory;
            const matchesDivision = !this.filterDivision || asset.division === this.filterDivision;
            const matchesStatus = !this.filterStatus || asset.status === this.filterStatus;
            
            return matchesSearch && matchesCategory && matchesDivision && matchesStatus;
          });
        },
        
        clearFilters() {
          this.search = '';
          this.filterCategory = '';
          this.filterDivision = '';
          this.filterStatus = '';
        },
        
        formatCurrency(amount) {
          return new Intl.NumberFormat('en-US', {
            style: 'currency',
            currency: 'USD'
          }).format(amount);
        },
        
        getStatusClass(status) {
          const classes = {
            available: 'bg-green-100 text-green-800',
            in_use: 'bg-blue-100 text-blue-800',
            maintenance: 'bg-yellow-100 text-yellow-800',
            damaged: 'bg-red-100 text-red-800',
            retired: 'bg-gray-100 text-gray-800'
          };
          return classes[status] || 'bg-gray-100 text-gray-800';
        },
        
        getStatusLabel(status) {
          const labels = {
            available: 'Available',
            in_use: 'In Use',
            maintenance: 'Maintenance',
            damaged: 'Damaged',
            retired: 'Retired'
          };
          return labels[status] || status;
        }
      };
    }
  </script>
</body>
</html>
